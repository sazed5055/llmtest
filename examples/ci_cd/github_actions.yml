# Example GitHub Actions workflow for llmtest
# Place this file in: .github/workflows/llm-tests.yml

name: LLM Application Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  llm-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install 'git+https://github.com/sazed5055/llmtest.git@v0.1.0#egg=llmtest[all]'

    - name: Run LLM tests with OpenAI
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        llmtest run tests/llmtest.yaml --output results.json --quiet

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: llm-test-results
        path: results.json

    - name: Generate HTML report
      if: always()
      run: |
        llmtest run tests/llmtest.yaml --html report.html

    - name: Upload HTML report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: llm-test-report
        path: report.html

    - name: Check test results
      run: |
        # Parse JSON and fail if tests failed
        python -c "
        import json, sys
        with open('results.json') as f:
            results = json.load(f)
        print(f'Pass rate: {results[\"summary\"][\"pass_rate\"]}%')
        if results['summary']['failed'] > 0:
            print(f'❌ {results[\"summary\"][\"failed\"]} tests failed')
            sys.exit(1)
        print('✅ All tests passed!')
        "

  regression-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install llmtest
      run: |
        pip install 'git+https://github.com/sazed5055/llmtest.git@v0.1.0#egg=llmtest[all]'

    - name: Checkout baseline (main branch)
      run: |
        git fetch origin main:main
        git checkout main
        cp tests/llmtest.yaml baseline.yaml
        git checkout -

    - name: Run regression comparison
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        llmtest compare baseline.yaml tests/llmtest.yaml --output comparison.json

    - name: Upload comparison results
      uses: actions/upload-artifact@v4
      with:
        name: regression-comparison
        path: comparison.json

    - name: Comment on PR
      uses: actions/github-script@v7
      if: always()
      with:
        script: |
          const fs = require('fs');
          const comparison = JSON.parse(fs.readFileSync('comparison.json', 'utf8'));

          const comment = `## 🤖 LLM Test Regression Report

          **Tests Compared:** ${comparison.total_tests}
          **Unchanged:** ${comparison.unchanged}
          **Changed:** ${comparison.changed}
          **Critical Regressions:** ${comparison.critical_regressions}

          **Recommendation:** ${comparison.safe_to_promote ? '✅ Safe to promote' : '❌ Review required'}

          [View full comparison artifact](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          `;

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });

  cost-tracking:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install llmtest
      run: |
        pip install 'git+https://github.com/sazed5055/llmtest.git@v0.1.0#egg=llmtest[all]'

    - name: Run tests and track metrics
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        # Run tests and capture metrics
        llmtest run tests/llmtest.yaml --output metrics.json --quiet

        # Parse and display cost information (if available)
        python -c "
        import json
        with open('metrics.json') as f:
            data = json.load(f)
        print('📊 Test Metrics:')
        print(f'Total tests: {data[\"summary\"][\"total\"]}')
        print(f'Pass rate: {data[\"summary\"][\"pass_rate\"]}%')
        # Add token/cost tracking if available in your metrics
        "
